# Minneapolis Singles — Screenshot Capture Manifest
# For use with: https://github.com/johndoucette63/screenshot-tool
#
# All selectors use data-testid attributes from spike/data-testid branch.
# Convention: docs/design/data-testid-convention.md
#
# Run: capture run manifests/minneapolis-singles.yaml
# Prereqs: local dev server running (cd frontend && npm run dev)
#           backend running with demo data (cd backend && uvicorn ...)

base_url: "http://localhost:5173"
output_dir: "./screenshots/minneapolis-singles"
timestamp_dirs: true

enabled_viewports: [desktop]

defaults:
  wait_until: "networkidle"
  wait_after: 800
  format: "png"

viewports:
  desktop: { width: 1440, height: 900 }
  mobile: { width: 390, height: 844, device_scale_factor: 2 }
  tablet: { width: 768, height: 1024 }

# ---------------------------------------------------------------------------
# Auth Flows
# ---------------------------------------------------------------------------
# Credentials come from environment / .env file.
# ADMIN_EMAIL, ADMIN_PASSWORD — a system_admin account
# MEMBER_EMAIL, MEMBER_PASSWORD — an active member account

auth_flows:
  admin:
    steps:
      - goto: "/admin/login"
      - fill: { selector: "[data-testid='input-email']", value: "${ADMIN_EMAIL}" }
      - fill: { selector: "[data-testid='input-password']", value: "${ADMIN_PASSWORD}" }
      - click: "[data-testid='action-submit-login']"
      - wait_for: "[data-testid='page-admin-dashboard']"
  member:
    steps:
      - goto: "/member/login"
      - fill: { selector: "[data-testid='input-email']", value: "${MEMBER_EMAIL}" }
      - fill: { selector: "[data-testid='input-password']", value: "${MEMBER_PASSWORD}" }
      - click: "[data-testid='action-submit-login']"
      - wait_for: "[data-testid='page-member-search']"

# ---------------------------------------------------------------------------
# Pages — Member Portal
# ---------------------------------------------------------------------------

pages:

  # --- Auth screens (no auth needed) ---

  - id: member-login-default
    path: "/member/login"
    auth: none
    viewports: [desktop, mobile]
    full_page: false
    before_capture:
      - wait_for: "[data-testid='page-member-login']"

  - id: member-forgotpw-default
    path: "/member/forgot-password"
    auth: none
    viewports: [desktop]
    full_page: false
    before_capture:
      - wait_for: "[data-testid='page-member-forgot-password']"

  - id: member-resetpw-default
    path: "/member/reset-password"
    auth: none
    viewports: [desktop]
    full_page: false
    before_capture:
      - wait_for: "[data-testid='page-member-reset-password']"

  # --- Search / Browse ---

  - id: member-search-default
    path: "/member/search"
    auth: member
    viewports: [desktop, mobile, tablet]
    full_page: true
    before_capture:
      - wait_for: "[data-testid='page-member-search']"

  - id: member-search-filtered
    path: "/member/search"
    auth: member
    viewports: [desktop]
    full_page: true
    before_capture:
      - wait_for: "[data-testid='section-filter-panel']"
      - select_option: { selector: "[data-testid='input-age-range']", value: "50–60" }
      - wait_after: 1000

  - id: member-search-newmembers
    path: "/member/search"
    auth: member
    viewports: [desktop]
    full_page: true
    before_capture:
      - wait_for: "[data-testid='section-filter-panel']"
      - click: "[data-testid='action-filter-new-members']"
      - wait_after: 1000

  # --- Member Profile ---

  - id: member-profile-full
    path: "/member/search"
    auth: member
    viewports: [desktop, mobile]
    full_page: true
    before_capture:
      - wait_for: "[data-testid='card-member']"
      - click_and_navigate: "[data-testid='card-member'] >> nth=0"
      - wait_after: 1500

  # --- Saved Members ---

  - id: member-saved-list
    path: "/member/saved"
    auth: member
    viewports: [desktop, mobile]
    full_page: false
    before_capture:
      - wait_for: "[data-testid='page-member-saved']"

  # --- Activity Tabs ---

  - id: member-activity-saved
    path: "/member/activity"
    auth: member
    viewports: [desktop, mobile]
    full_page: false
    before_capture:
      - wait_for: "[data-testid='page-member-activity']"
      - click: "[data-testid='tab-saved']"
      - wait_after: 500

  - id: member-activity-youselected
    path: "/member/activity"
    auth: member
    viewports: [desktop]
    full_page: false
    before_capture:
      - wait_for: "[data-testid='page-member-activity']"
      - click: "[data-testid='tab-you-selected']"
      - wait_after: 500

  - id: member-activity-selectedyou
    path: "/member/activity"
    auth: member
    viewports: [desktop]
    full_page: false
    before_capture:
      - wait_for: "[data-testid='page-member-activity']"
      - click: "[data-testid='tab-selected-you']"
      - wait_after: 500

  - id: member-activity-matches
    path: "/member/activity"
    auth: member
    viewports: [desktop]
    full_page: true
    before_capture:
      - wait_for: "[data-testid='page-member-activity']"
      - click: "[data-testid='tab-matches']"
      - wait_after: 500

  - id: member-activity-maybelater
    path: "/member/activity"
    auth: member
    viewports: [desktop]
    full_page: false
    before_capture:
      - wait_for: "[data-testid='page-member-activity']"
      - click: "[data-testid='tab-maybe-later']"
      - wait_after: 500

  - id: member-activity-nothankyou
    path: "/member/activity"
    auth: member
    viewports: [desktop]
    full_page: false
    before_capture:
      - wait_for: "[data-testid='page-member-activity']"
      - click: "[data-testid='tab-no-thank-you']"
      - wait_after: 500

  # --- My Profile ---

  - id: member-myprofile-default
    path: "/member/profile"
    auth: member
    viewports: [desktop]
    full_page: false
    before_capture:
      - wait_for: "[data-testid='page-member-my-profile']"

  # --- Coming Soon (catch-all) ---

  - id: member-comingsoon
    path: "/member/nonexistent-page"
    auth: member
    viewports: [desktop]
    full_page: false
    before_capture:
      - wait_for: "[data-testid='page-member-coming-soon']"

  # ---------------------------------------------------------------------------
  # Pages — Admin Portal
  # ---------------------------------------------------------------------------

  # --- Admin Auth (no auth needed) ---

  - id: admin-login-default
    path: "/admin/login"
    auth: none
    viewports: [desktop]
    full_page: false
    before_capture:
      - wait_for: "[data-testid='page-admin-login']"

  # --- Dashboard ---

  - id: admin-dashboard-default
    path: "/admin/dashboard"
    auth: admin
    viewports: [desktop]
    full_page: false
    before_capture:
      - wait_for: "[data-testid='page-admin-dashboard']"

  # --- Member Management ---

  - id: admin-members-default
    path: "/admin/members"
    auth: admin
    viewports: [desktop]
    full_page: true
    before_capture:
      - wait_for: "[data-testid='page-admin-members']"

  - id: admin-member-create-top
    path: "/admin/members/new"
    auth: admin
    viewports: [desktop]
    full_page: false
    before_capture:
      - wait_for: "[data-testid='page-admin-member-create']"

  - id: admin-member-create-full
    path: "/admin/members/new"
    auth: admin
    viewports: [desktop]
    full_page: true
    before_capture:
      - wait_for: "[data-testid='page-admin-member-create']"

  # --- Member Detail Tabs ---
  # Uses member ID 1 — adjust if demo data uses different IDs

  - id: admin-member-personal
    path: "/admin/members"
    auth: admin
    viewports: [desktop]
    full_page: true
    before_capture:
      - wait_for: "tbody tr.cursor-pointer"
      - click_and_navigate: "tbody tr.cursor-pointer >> nth=0"
      - wait_after: 1500

  - id: admin-member-media
    path: "/admin/members"
    auth: admin
    viewports: [desktop]
    full_page: true
    before_capture:
      - wait_for: "tbody tr.cursor-pointer"
      - click_and_navigate: "tbody tr.cursor-pointer >> nth=0"
      - wait_after: 1500
      - click: "button:has-text('Media')"
      - wait_after: 500

  - id: admin-member-membership
    path: "/admin/members"
    auth: admin
    viewports: [desktop]
    full_page: true
    before_capture:
      - wait_for: "tbody tr.cursor-pointer"
      - click_and_navigate: "tbody tr.cursor-pointer >> nth=0"
      - wait_after: 1500
      - click: "button:has-text('Membership')"
      - wait_after: 500

  - id: admin-member-admin
    path: "/admin/members"
    auth: admin
    viewports: [desktop]
    full_page: true
    before_capture:
      - wait_for: "tbody tr.cursor-pointer"
      - click_and_navigate: "tbody tr.cursor-pointer >> nth=0"
      - wait_after: 1500
      - click: "button:has-text('Admin')"
      - wait_after: 500

  # --- Staff ---

  - id: admin-staff-list
    path: "/admin/staff"
    auth: admin
    viewports: [desktop]
    full_page: false

  # --- Activity Log ---

  - id: admin-activitylog-default
    path: "/admin/activity-log"
    auth: admin
    viewports: [desktop]
    full_page: true
    before_capture:
      - wait_for: "[data-testid='page-admin-activity-log']"

  # --- Selection Activity ---

  - id: admin-selection-queue
    path: "/admin/selection-activity"
    auth: admin
    viewports: [desktop]
    full_page: true
    before_capture:
      - wait_for: "[data-testid='page-admin-selection-activity']"

  - id: admin-selection-log
    path: "/admin/selection-activity"
    auth: admin
    viewports: [desktop]
    full_page: true
    before_capture:
      - wait_for: "[data-testid='page-admin-selection-activity']"
      - click: "button:has-text('Monitoring Log')"
      - wait_after: 500

  # --- Featured Members Report ---

  - id: admin-featured-default
    path: "/admin/featured-members"
    auth: admin
    viewports: [desktop]
    full_page: true
    before_capture:
      - wait_for: "[data-testid='page-admin-featured-members']"

  # --- Settings ---

  - id: admin-settings-default
    path: "/admin/settings"
    auth: admin
    viewports: [desktop]
    full_page: false
    before_capture:
      - wait_for: "[data-testid='page-admin-settings']"

  # ---------------------------------------------------------------------------
  # Cross-Cutting: Navigation Chrome
  # ---------------------------------------------------------------------------

  - id: admin-sidebar-expanded
    path: "/admin/dashboard"
    auth: admin
    viewports: [desktop]
    full_page: false
    before_capture:
      - wait_for: "[data-testid='nav-dashboard']"

  - id: member-nav-desktop
    path: "/member/search"
    auth: member
    viewports: [desktop]
    full_page: false
    before_capture:
      - wait_for: "[data-testid='nav-search']"

  - id: member-nav-mobile
    path: "/member/search"
    auth: member
    viewports: [mobile]
    full_page: false
    before_capture:
      - wait_for: "[data-testid='nav-mobile-menu']"
      - click: "[data-testid='nav-mobile-menu']"
      - wait_after: 300
