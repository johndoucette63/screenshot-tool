base_url: "http://localhost:5173"
output_dir: "./screenshots"
timestamp_dirs: true

enabled_viewports: [desktop]

defaults:
  wait_until: "networkidle"
  wait_after: 1500
  format: "png"

viewports:
  desktop: { width: 1440, height: 900 }
  mobile: { width: 390, height: 844, device_scale_factor: 2 }
  tablet: { width: 768, height: 1024 }

auth_flows:
  admin:
    steps:
      - goto: "/admin/login"
      - fill: { selector: "input[type='email']", value: "${ADMIN_EMAIL}" }
      - fill: { selector: "input[type='password']", value: "${ADMIN_PASSWORD}" }
      - click: "button[type='submit']"
      - wait_for: "nav"

  member:
    steps:
      - goto: "/member/login"
      - fill: { selector: "input[type='email']", value: "${MEMBER_EMAIL}" }
      - fill: { selector: "input[type='password']", value: "${MEMBER_PASSWORD}" }
      - click: "button[type='submit']"
      - wait_for_url: "/member/search"

pages:
  # ── Login pages (no auth) ──────────────────────────────────────────────
  - id: admin-login
    path: "/admin/login"
    auth: none
    viewports: [desktop, mobile]
    full_page: false

  - id: member-login
    path: "/member/login"
    auth: none
    viewports: [desktop, mobile]
    full_page: false

  # ── Authenticated pages ────────────────────────────────────────────────
  - id: admin-dashboard
    path: "/admin/dashboard"
    auth: admin
    viewports: [desktop]
    full_page: false

  - id: member-search-default
    path: "/member/search"
    auth: member
    viewports: [desktop, mobile, tablet]
    full_page: true

  - id: member-profile
    path: "/member/search"
    auth: member
    viewports: [desktop, mobile]
    full_page: true
    before_capture:
      - wait_for: "button.rounded-lg"
      - click_and_navigate: "button.rounded-lg >> nth=0"
      - wait_after: 1500
